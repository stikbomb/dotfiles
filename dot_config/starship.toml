# Starship config — Nord theme

# Первая строка: директория + git + язык
# Вторая строка: символ ввода
format = """
$directory\
$git_branch\
$git_status\
$git_state\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$cmd_duration\
$line_break\
$character"""

# Правый промпт: время
right_format = """$time"""

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
style = "bold #81A1C1"
truncation_length = 4
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
style = "#A3BE8C"
symbol = " "
format = "on [$symbol$branch(:$remote_branch)]($style) "

[git_status]
style = "#EBCB8B"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "󰞇 "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = " "
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_state]
style = "bold #BF616A"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

# ── Языки (показываются только в нужных директориях) ─────────────────────────
[nodejs]
style = "#A3BE8C"
symbol = " "
format = "[$symbol($version)]($style) "

[python]
style = "#EBCB8B"
symbol = " "
format = "[$symbol($version)]($style) "

[rust]
style = "#D08770"
symbol = " "
format = "[$symbol($version)]($style) "

[golang]
style = "#88C0D0"
symbol = " "
format = "[$symbol($version)]($style) "

[docker_context]
style = "#88C0D0"
symbol = " "
format = "[$symbol$context]($style) "
only_with_files = true

# ── Command duration ──────────────────────────────────────────────────────────
[cmd_duration]
style = "#4C566A"
min_time = 2_000
format = "[󱦺 $duration]($style) "

# ── Time ──────────────────────────────────────────────────────────────────────
[time]
disabled = false
style = "#4C566A"
format = "[$time]($style)"
time_format = "%H:%M"

# ── Символ ввода ──────────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](#88C0D0)"
error_symbol = "[❯](#BF616A)"
vimcmd_symbol = "[❮](#A3BE8C)"
